version: "3.9"

services:
  # ── Persona API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: [.env]
    volumes:
      # Persistent named volume holds the downloaded vector store across restarts.
      - vector_data:/data
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      # Allow extra time on first boot for vector store download (~90s for 408 MB)
      start_period: 120s

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Certbot (run manually for cert issuance / renewal, not always-on) ────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    profiles: ["certbot"]   # docker compose --profile certbot run certbot ...

volumes:
  vector_data:     # persistent disk for the downloaded vector store
  certbot_www:     # ACME challenge files served by nginx
  certbot_conf:    # Let's Encrypt certificates
