# Temporary HTTP-only config used during the initial Let's Encrypt certificate setup.
# Replace nginx/nginx.conf with this file, start nginx, get the cert, then switch back.
# See docs/DigitalOcean-Deployment.md for full instructions.

events {
    worker_connections 1024;
}

http {
    upstream persona_api {
        server api:8000;
    }

    server {
        listen 80;
        server_name YOUR_DOMAIN;

        # Serve ACME challenge files for certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Proxy everything else straight to the API (no HTTPS yet)
        location / {
            proxy_pass       http://persona_api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
